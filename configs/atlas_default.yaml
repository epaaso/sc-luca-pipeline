experiment_name: scanvi_atlas_default
input_h5ad: /data/luca_atlas/extended.h5ad
shared_run_root: /datos/LUCA_model/scanvi_atlas/runs
sif: /data/containers/scanvi-atlas-cu12.sif
bind_paths: /datos,/data,/home,/datos/home
work_dir: /datos/home/epaaso/slurm-gpu-jobs/nf-work/scanvi_atlas

seed: 0
batch_key: dataset
labels_key: cell_type_tumor
unlabeled_category: Unknown

origin_key: origin
origin_values: [tumor_primary]
stage_key: uicc_stage
stages: [I, II, III, "III or IV", IV]
study_key: study
exclude_studies:
  - Goveia_Carmeliet_2020
  - Leader_Merad_2021
  - Guo_Zhang_2018
  - Wu_Zhou_2021
sample_key: sample
split_batch_dataset:

counts_layer: count
drop_layers: [counts_length_scaled, count]
drop_raw: true
round_counts: false

hvg_mode: compute
hvg_n_top_genes: 6000
hvg_flavor: seurat_v3
hvg_batch_key: dataset
hvg_column: is_highly_variable
max_cells:
max_genes:
save_prepared_h5ad: false

dl_num_workers: 8
float32_matmul_precision: high
numba_threads: 30
compute_neighbors: true
compute_leiden: true
compute_umap: true
n_neighbors: 8
collapse_wu_dataset: true
latent_obs_columns: [dataset, study, sample, uicc_stage]

scvi_model_params:
  n_layers: 4
  n_latent: 10
  n_hidden: 1024
  gene_likelihood: nb
  dispersion: gene-batch
  use_batch_norm: both
  encode_covariates: true
  deeply_inject_covariates: false
scvi_train_params:
  max_epochs: 100
  batch_size: 128
scvi_early_stopping: true
scvi_early_stopping_kwargs:
  early_stopping_monitor: elbo_validation
  early_stopping_patience: 10
  early_stopping_min_delta: 0.1
scvi_plan_kwargs:
  reduce_lr_on_plateau: true
  lr_patience: 8
  lr_factor: 0.05

scanvi_train_params:
  max_epochs: 300
  batch_size: 128
scanvi_early_stopping: true
scanvi_early_stopping_kwargs:
  early_stopping_monitor: elbo_validation
  early_stopping_patience: 10
  early_stopping_min_delta: 0.7
scanvi_plan_kwargs:
  reduce_lr_on_plateau: true
  lr_patience: 8
  lr_factor: 0.1
  lr: 1e-4

slurm_cpus: 20
slurm_memory: 96 GB
slurm_time: "48:00:00"
slurm_gpus: 1
